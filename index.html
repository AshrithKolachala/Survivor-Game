<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>SURVIVORS</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0f;
  display:flex; align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
  touch-action:none; user-select:none; -webkit-user-select:none;
}
canvas { display:block; touch-action:none; }

/* ── HUD ── */
#ui {
  position:fixed; top:0; left:0; right:0;
  padding:14px 16px; display:flex; align-items:center; gap:14px;
  pointer-events:none; z-index:10;
}
.ui-label { color:#888; font-size:10px; letter-spacing:.1em; text-transform:uppercase; }
#health-bar { width:120px; height:6px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
#health-fill { height:100%; background:#e05060; border-radius:3px; width:100%; }
#xp-bar { width:100px; height:6px; background:rgba(255,255,255,.08); border-radius:3px; overflow:hidden; }
#xp-fill { height:100%; background:#6060e0; border-radius:3px; width:0%; }
#health-bar-wrap,#xp-bar-wrap { display:flex; align-items:center; gap:6px; }
#level-display { color:#aaa; font-size:12px; }
#level-display span { color:#c8c0ff; font-weight:bold; }
#kill-count { margin-left:auto; margin-right:100px; color:#888; font-size:11px; }
#kill-count span { color:#e0b060; }

/* ── Boss bar ── */
#boss-bar-wrap {
  position:fixed; bottom:40px; left:50%; transform:translateX(-50%);
  flex-direction:column; align-items:center; gap:6px;
  pointer-events:none; z-index:10; display:none;
}
#boss-bar-wrap.active { display:flex; }
#boss-name { color:#ff6040; font-size:10px; letter-spacing:.2em; text-transform:uppercase; }
#boss-bar { width:300px; height:8px; background:rgba(255,255,255,.08); border-radius:4px; overflow:hidden; }
#boss-fill { height:100%; background:linear-gradient(90deg,#ff4020,#ff8040); border-radius:4px; }

/* ── Minimap ── */
#minimap-wrap {
  position:fixed; top:60px; right:12px;
  pointer-events:none; z-index:10;
}
#minimap { border:1px solid rgba(255,255,255,.1); border-radius:3px; display:block; }
#minimap-label { color:rgba(255,255,255,.18); font-size:9px; letter-spacing:.1em; text-align:right; margin-top:2px; }

/* ── Account btn ── */
#account-btn {
  position:fixed; top:12px; right:12px;
  background:transparent; border:1px solid rgba(255,255,255,.12);
  color:#555; font-family:inherit; font-size:10px; letter-spacing:.1em;
  padding:5px 9px; cursor:pointer; text-transform:uppercase;
  z-index:20; border-radius:2px; transition:all .2s;
}
#account-btn:hover { border-color:rgba(255,255,255,.3); color:#aaa; }
#account-btn.logged-in { color:#88cc88; border-color:rgba(100,200,100,.25); }

/* ── Title / Game-over overlay ── */
#overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.88);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:100; color:#fff;
}
#overlay h1 {
  font-size:48px; letter-spacing:.08em;
  color:#e05060; text-shadow:0 0 40px rgba(224,80,96,.4);
  margin-bottom:10px;
}
#overlay .subtitle { color:#555; font-size:12px; letter-spacing:.15em; margin-bottom:36px; }
#result-stats { color:#aaa; font-size:13px; line-height:2; text-align:center; margin-bottom:16px; display:none; }
#result-stats strong { color:#e0d0ff; }
#scores-panel { margin-bottom:24px; text-align:center; display:none; }
#scores-panel h3 { color:#444; font-size:9px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:8px; }
.score-row { display:flex; justify-content:center; gap:20px; color:#555; font-size:11px; line-height:2; }
.score-row.hl .sc-kills,.score-row.hl .sc-time,.score-row.hl .sc-lvl,.score-row.hl .rank { filter:brightness(2); }
.rank { color:#444; width:16px; }
.sc-kills { color:#e0b060; min-width:56px; }
.sc-time  { color:#88aacc; min-width:46px; }
.sc-lvl   { color:#c8c0ff; min-width:36px; }
#start-btn {
  background:transparent; border:1px solid rgba(255,255,255,.2);
  color:#ccc; font-family:inherit; font-size:12px;
  letter-spacing:.15em; padding:12px 30px; cursor:pointer;
  text-transform:uppercase; transition:all .2s;
}
#start-btn:hover { border-color:rgba(255,255,255,.5); color:#fff; background:rgba(255,255,255,.05); }
#overlay-hint { color:#333; font-size:10px; margin-top:16px; letter-spacing:.1em; }

/* ── Upgrade overlay ── */
#upgrade-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.72);
  display:none; align-items:center; justify-content:center; z-index:50;
}
#upgrade-overlay.active { display:flex; }
#upgrade-box {
  background:#111118; border:1px solid rgba(255,255,255,.1);
  border-radius:4px; padding:28px; width:540px; max-width:92vw;
}
#upgrade-box h2 { color:#c8c0ff; font-size:11px; letter-spacing:.15em; text-transform:uppercase; margin-bottom:20px; text-align:center; }
.upgrade-cards { display:flex; gap:10px; }
.upgrade-card {
  flex:1; border:1px solid rgba(255,255,255,.1); border-radius:3px;
  padding:18px 14px; cursor:pointer; background:transparent;
  text-align:left; color:inherit; font-family:inherit; transition:all .15s;
}
.upgrade-card:hover { border-color:rgba(200,192,255,.5); background:rgba(200,192,255,.05); }
.upgrade-card .icon { font-size:20px; margin-bottom:8px; display:block; }
.upgrade-card .name { color:#ddd; font-size:12px; margin-bottom:4px; letter-spacing:.04em; }
.upgrade-card .desc { color:#555; font-size:10px; line-height:1.5; }

/* ── Auth overlay ── */
#auth-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,.8);
  display:none; align-items:center; justify-content:center; z-index:200;
}
#auth-overlay.active { display:flex; }
#auth-box {
  background:#0f0f18; border:1px solid rgba(255,255,255,.1);
  border-radius:4px; padding:28px 32px; width:320px; max-width:90vw;
}
#auth-box h2 { color:#c8c0ff; font-size:11px; letter-spacing:.2em; text-transform:uppercase; margin-bottom:20px; text-align:center; }
.auth-tabs { display:flex; margin-bottom:18px; border-bottom:1px solid rgba(255,255,255,.08); }
.auth-tab {
  flex:1; background:transparent; border:none; border-bottom:2px solid transparent;
  color:#444; font-family:inherit; font-size:10px; letter-spacing:.1em;
  text-transform:uppercase; padding:7px; cursor:pointer; margin-bottom:-1px; transition:all .15s;
}
.auth-tab.active { color:#c8c0ff; border-bottom-color:#c8c0ff; }
.auth-field { margin-bottom:12px; }
.auth-field label { display:block; color:#444; font-size:9px; letter-spacing:.1em; text-transform:uppercase; margin-bottom:5px; }
.auth-field input {
  width:100%; background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.1); border-radius:2px;
  color:#ccc; font-family:inherit; font-size:12px; padding:7px 9px; outline:none;
}
.auth-field input:focus { border-color:rgba(200,192,255,.4); }
.auth-action {
  width:100%; margin-top:4px; background:transparent;
  border:1px solid rgba(200,192,255,.25); color:#c8c0ff;
  font-family:inherit; font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; padding:9px; cursor:pointer; border-radius:2px; transition:all .15s;
}
.auth-action:hover { background:rgba(200,192,255,.07); border-color:rgba(200,192,255,.5); }
.auth-secondary {
  width:100%; margin-top:8px; background:transparent;
  border:1px solid rgba(255,255,255,.07); color:#444;
  font-family:inherit; font-size:11px; letter-spacing:.1em;
  text-transform:uppercase; padding:9px; cursor:pointer; border-radius:2px;
}
#auth-msg { color:#e05060; font-size:10px; text-align:center; margin-top:8px; min-height:14px; }
#auth-close { display:block; width:100%; margin-top:12px; background:none; border:none; color:#333; font-family:inherit; font-size:9px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; text-align:center; }
#auth-close:hover { color:#666; }
#auth-note { color:#444; font-size:9px; text-align:center; margin-top:12px; line-height:1.6; }

/* ── Boss banner ── */
#boss-banner {
  position:fixed; top:28%; left:50%; transform:translateX(-50%);
  pointer-events:none; z-index:60; text-align:center;
  opacity:0; transition:opacity .3s;
}
#boss-banner.show { opacity:1; }
#boss-banner .btitle { color:#ff6040; font-size:26px; letter-spacing:.15em; text-shadow:0 0 30px rgba(255,80,30,.6); }
#boss-banner .bsub   { color:#663322; font-size:10px; letter-spacing:.2em; margin-top:3px; }

/* ── Virtual joystick ── */
#joy-zone {
  position:fixed; left:0; bottom:0; width:50vw; height:45vh;
  z-index:15; display:none;
}
#joy-base {
  position:absolute; width:100px; height:100px; border-radius:50%;
  background:rgba(255,255,255,.05); border:1.5px solid rgba(255,255,255,.12);
  transform:translate(-50%,-50%); pointer-events:none; display:none;
}
#joy-knob {
  position:absolute; width:42px; height:42px; border-radius:50%;
  background:rgba(200,232,255,.22); border:1.5px solid rgba(200,232,255,.4);
  transform:translate(-50%,-50%); pointer-events:none; display:none;
}

/* ── Mobile ── */
@media (max-width:700px) {
  #joy-zone  { display:block; }
  #kill-count { margin-right:76px; }
  #health-bar { width:80px; }
  #xp-bar { width:64px; }
  .upgrade-cards { flex-direction:column; }
  #boss-bar { width:200px; }
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<!-- HUD -->
<div id="ui">
  <div id="health-bar-wrap">
    <span class="ui-label">HP</span>
    <div id="health-bar"><div id="health-fill"></div></div>
  </div>
  <div id="xp-bar-wrap">
    <span class="ui-label">XP</span>
    <div id="xp-bar"><div id="xp-fill"></div></div>
  </div>
  <div id="level-display">LVL <span id="lvl-num">1</span></div>
  <div id="kill-count">Kills: <span id="kills">0</span></div>
</div>

<!-- Boss HP -->
<div id="boss-bar-wrap">
  <span id="boss-name">BOSS</span>
  <div id="boss-bar"><div id="boss-fill" style="width:100%"></div></div>
</div>

<!-- Minimap -->
<div id="minimap-wrap">
  <canvas id="minimap" width="120" height="120"></canvas>
  <div id="minimap-label">radar</div>
</div>

<!-- Account -->
<button id="account-btn">⬡ sign in</button>

<!-- Auth -->
<div id="auth-overlay">
  <div id="auth-box">
    <h2>Cloud Save</h2>
    <div class="auth-tabs">
      <button class="auth-tab active" data-tab="login">Sign In</button>
      <button class="auth-tab" data-tab="register">Register</button>
      <button class="auth-tab" data-tab="account" style="display:none">Account</button>
    </div>
    <div id="af-login">
      <div class="auth-field"><label>Username</label><input id="a-user" type="text" autocomplete="username" spellcheck="false"></div>
      <div class="auth-field"><label>Password</label><input id="a-pass" type="password" autocomplete="current-password"></div>
      <button class="auth-action" id="a-login-btn">Sign In</button>
    </div>
    <div id="af-register" style="display:none">
      <div class="auth-field"><label>Username</label><input id="r-user" type="text" autocomplete="username" spellcheck="false"></div>
      <div class="auth-field"><label>Password</label><input id="r-pass" type="password" autocomplete="new-password"></div>
      <button class="auth-action" id="a-reg-btn">Create Account</button>
    </div>
    <div id="af-account" style="display:none">
      <p id="a-who" style="color:#aaa;font-size:12px;text-align:center;margin-bottom:14px;"></p>
      <button class="auth-action" id="a-sync-btn">↑ Sync Scores</button>
      <button class="auth-secondary" id="a-logout-btn">Sign Out</button>
    </div>
    <div id="auth-msg"></div>
    <div id="auth-note">Scores save locally without login.<br>Sign in to sync across devices.</div>
    <button id="auth-close">dismiss</button>
  </div>
</div>

<!-- Title / Game Over -->
<div id="overlay">
  <h1 id="overlay-title">SURVIVORS</h1>
  <p class="subtitle" id="overlay-sub">a minimalist arena shooter</p>
  <div id="result-stats"></div>
  <div id="scores-panel">
    <h3>Best Runs</h3>
    <div id="scores-list"></div>
  </div>
  <button id="start-btn">Begin</button>
  <p id="overlay-hint">WASD · auto-fire · survive</p>
</div>

<!-- Upgrade -->
<div id="upgrade-overlay">
  <div id="upgrade-box">
    <h2>Level Up — Choose an upgrade</h2>
    <div class="upgrade-cards" id="upgrade-cards"></div>
  </div>
</div>

<!-- Boss banner -->
<div id="boss-banner">
  <div class="btitle" id="boss-btitle"></div>
  <div class="bsub">ELIMINATE THE THREAT</div>
</div>

<!-- Joystick -->
<div id="joy-zone">
  <div id="joy-base"></div>
  <div id="joy-knob"></div>
</div>

<script>
'use strict';

// ── Anti-inspect ──────────────────────────────────────────────────────────────
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if (e.key === 'F12') e.preventDefault();
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && ['I','J','C'].includes(e.key)) e.preventDefault();
  if ((e.ctrlKey||e.metaKey) && e.key === 'U') e.preventDefault();
}, true);

// ── Canvas ────────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const mm     = document.getElementById('minimap');
const mctx   = mm.getContext('2d');

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const s = window.innerWidth <= 700 ? 90 : 120;
  mm.width = s; mm.height = s;
}
resize();
window.addEventListener('resize', resize);

// ── Constants ─────────────────────────────────────────────────────────────────
const WS   = 3000;   // world size
const GC   = 80;     // grid cell
const PR   = 12;     // player radius
const PS   = 220;    // player base speed
const BR   = 4;      // bullet radius
const BS   = 480;    // bullet speed
const ER   = 14;     // enemy base radius
const ES   = 70;     // enemy base speed
const EH   = 3;      // enemy base hp
const PKR  = 8;      // pickup radius
const MM_M = 5;      // minimap margin

// ── Keyboard input ────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup',   e => { keys[e.code] = false; });

// ── Joystick ──────────────────────────────────────────────────────────────────
const joy = { active:false, id:null, ox:0, oy:0, dx:0, dy:0 };
const jZone = document.getElementById('joy-zone');
const jBase = document.getElementById('joy-base');
const jKnob = document.getElementById('joy-knob');
const JR = 44;

function jShow(x,y) {
  jBase.style.display = jKnob.style.display = '';
  jBase.style.left = x+'px'; jBase.style.top = y+'px';
  jKnob.style.left = x+'px'; jKnob.style.top = y+'px';
}
function jHide() {
  jBase.style.display = jKnob.style.display = 'none';
  joy.active = false; joy.dx = 0; joy.dy = 0;
}
function jMove(x,y) {
  let dx = x-joy.ox, dy = y-joy.oy;
  const d = Math.hypot(dx,dy);
  if (d > JR) { dx=dx/d*JR; dy=dy/d*JR; }
  jKnob.style.left = (joy.ox+dx)+'px';
  jKnob.style.top  = (joy.oy+dy)+'px';
  joy.dx = dx/JR; joy.dy = dy/JR;
}
jZone.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  joy.active=true; joy.id=t.identifier; joy.ox=t.clientX; joy.oy=t.clientY;
  jShow(t.clientX, t.clientY);
}, {passive:false});
jZone.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===joy.id) { jMove(t.clientX,t.clientY); break; }
}, {passive:false});
jZone.addEventListener('touchend', e => {
  e.preventDefault();
  for (const t of e.changedTouches) if (t.identifier===joy.id) { jHide(); break; }
}, {passive:false});
canvas.addEventListener('touchstart', e => e.preventDefault(), {passive:false});
canvas.addEventListener('touchmove',  e => e.preventDefault(), {passive:false});

// ── Utility ───────────────────────────────────────────────────────────────────
const rnd   = (a,b) => a+Math.random()*(b-a);
const rndI  = (a,b) => Math.floor(rnd(a,b));
const clamp = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const dist  = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const norm  = (dx,dy) => { const l=Math.hypot(dx,dy)||1; return [dx/l,dy/l]; };

// ── Screen shake ──────────────────────────────────────────────────────────────
const shake = {v:0};
function triggerShake(a) { shake.v = Math.max(shake.v,a); }
function shakeOff() {
  if (shake.v < .1) return [0,0];
  const a = Math.random()*Math.PI*2;
  return [Math.cos(a)*shake.v, Math.sin(a)*shake.v];
}

// ── High scores ───────────────────────────────────────────────────────────────
const HS_KEY = 'sv_scores_v2';
function loadScores() { try { return JSON.parse(localStorage.getItem(HS_KEY))||[]; } catch { return []; } }
function saveScore(entry) {
  let s = [...loadScores(), entry].sort((a,b)=>b.kills-a.kills||b.elapsed-a.elapsed).slice(0,5);
  try { localStorage.setItem(HS_KEY, JSON.stringify(s)); } catch {}
  if (auth.user) cloudSync();
  return s;
}

// ── Auth (localStorage-backed per-username cloud) ────────────────────────────
const auth = { user: null };
const UK = u => 'sv_acct_'+u.toLowerCase();

async function sha256(s) {
  const b = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s));
  return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
}
async function authRegister(u,p) {
  if (!u||u.length<2) return {ok:false,msg:'Username too short.'};
  if (p.length<4) return {ok:false,msg:'Password needs 4+ chars.'};
  const k = UK(u);
  if (localStorage.getItem(k)) return {ok:false,msg:'Username taken.'};
  const hash = await sha256(p+u.toLowerCase());
  localStorage.setItem(k, JSON.stringify({hash, scores:loadScores()}));
  return {ok:true};
}
async function authLogin(u,p) {
  if (!u) return {ok:false,msg:'Enter username.'};
  const raw = localStorage.getItem(UK(u));
  if (!raw) return {ok:false,msg:'Account not found.'};
  const rec = JSON.parse(raw);
  const hash = await sha256(p+u.toLowerCase());
  if (hash!==rec.hash) return {ok:false,msg:'Wrong password.'};
  return {ok:true, scores:rec.scores||[]};
}
function cloudSync() {
  if (!auth.user) return;
  const k = UK(auth.user);
  const raw = localStorage.getItem(k);
  if (!raw) return;
  const rec = JSON.parse(raw);
  const merged = [...loadScores(), ...(rec.scores||[])]
    .sort((a,b)=>b.kills-a.kills||b.elapsed-a.elapsed).slice(0,5);
  rec.scores = merged;
  localStorage.setItem(k, JSON.stringify(rec));
  try { localStorage.setItem(HS_KEY, JSON.stringify(merged)); } catch {}
  return merged;
}

// ── Auth UI ───────────────────────────────────────────────────────────────────
const authOverlay = document.getElementById('auth-overlay');
const authMsg     = document.getElementById('auth-msg');

function showAuth(tab) { switchTab(tab||'login'); authOverlay.classList.add('active'); authMsg.textContent=''; }
function hideAuth()    { authOverlay.classList.remove('active'); }
function switchTab(t) {
  document.querySelectorAll('.auth-tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  document.getElementById('af-login').style.display    = t==='login'    ? '' : 'none';
  document.getElementById('af-register').style.display = t==='register' ? '' : 'none';
  document.getElementById('af-account').style.display  = t==='account'  ? '' : 'none';
  authMsg.textContent='';
}
document.querySelectorAll('.auth-tab').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.tab)));
document.getElementById('account-btn').addEventListener('click',()=>{
  if (auth.user) {
    document.querySelector('.auth-tab[data-tab="account"]').style.display='';
    document.getElementById('a-who').textContent='Signed in as '+auth.user;
    showAuth('account');
  } else showAuth('login');
});
document.getElementById('auth-close').addEventListener('click', hideAuth);

function setAuthMsg(m, ok) { authMsg.style.color=ok?'#88cc88':'#e05060'; authMsg.textContent=m; }
function updateAccBtn() {
  const b=document.getElementById('account-btn');
  if (auth.user) { b.textContent='⬡ '+auth.user; b.classList.add('logged-in'); }
  else           { b.textContent='⬡ sign in';    b.classList.remove('logged-in'); }
}

document.getElementById('a-login-btn').addEventListener('click', async()=>{
  setAuthMsg('…');
  const res = await authLogin(document.getElementById('a-user').value.trim(), document.getElementById('a-pass').value);
  if (!res.ok) { setAuthMsg(res.msg); return; }
  auth.user = document.getElementById('a-user').value.trim().toLowerCase();
  const merged = cloudSync();
  setAuthMsg('Signed in! Scores synced.', true);
  updateAccBtn();
  setTimeout(()=>{ hideAuth(); authMsg.textContent=''; }, 1200);
});

document.getElementById('a-reg-btn').addEventListener('click', async()=>{
  setAuthMsg('…');
  const u=document.getElementById('r-user').value.trim(), p=document.getElementById('r-pass').value;
  const res = await authRegister(u,p);
  if (!res.ok) { setAuthMsg(res.msg); return; }
  auth.user = u.toLowerCase();
  setAuthMsg('Account created!', true);
  updateAccBtn();
  document.querySelector('.auth-tab[data-tab="account"]').style.display='';
  document.getElementById('a-who').textContent='Signed in as '+auth.user;
  setTimeout(()=>{ switchTab('account'); authMsg.textContent=''; }, 800);
});

document.getElementById('a-sync-btn').addEventListener('click',()=>{
  const m=cloudSync();

const UPGRADES = [
  {id:'speed',    icon:'⚡',name:'Overdrive',  desc:'+25% movement speed'},
  {id:'firerate', icon:'🔥',name:'Rapid Fire', desc:'Shoot 30% faster'},
  {id:'damage',   icon:'💥',name:'Power Shot', desc:'+2 damage per bullet'},
  {id:'pierce',   icon:'🔷',name:'Pierce',     desc:'Bullets pierce 1 extra enemy'},
  {id:'hp',       icon:'❤️',name:'Vitality',   desc:'+30 max HP, restore 30 HP'},
  {id:'multishot',icon:'🌀',name:'Spread Shot',desc:'Fire 3 bullets at once'},
  {id:'magnet',   icon:'🧲',name:'Magnetism',  desc:'XP orbs pulled from further'},
  {id:'aoe',      icon:'💣',name:'Burst Shot', desc:'Bullets explode on hit'},
];

// ── Boss definitions ──────────────────────────────────────────────────────────
const BOSS_DEFS = [
  {name:'THE CRUSHER', color:'#ff4422',glow:'rgba(255,60,20,.4)', hpMult:30,spdMult:.55,r:38,xp:80,  attack:'charge',  dmg:25},
  {name:'THE SWARM LORD',color:'#cc44ff',glow:'rgba(180,40,255,.4)',hpMult:20,spdMult:.4, r:32,xp:100, attack:'summon',  dmg:15},
  {name:'THE SPECTER',  color:'#40ffcc',glow:'rgba(40,255,180,.4)',hpMult:16,spdMult:1.1,r:26,xp:120, attack:'teleport',dmg:20},
];

// ── Game state ────────────────────────────────────────────────────────────────
let G, running=false, animId=null, lastTime=0;

function initG() {
  G = {
    p: { x:WS/2,y:WS/2, hp:100,maxHp:100, speed:PS, iframes:0, trail:[] },
    cam: { x:WS/2, y:WS/2 },
    bullets:[], enemies:[], boss:null, pickups:[], particles:[],
    gun: { firerate:.55, damage:3, pierce:0, multishot:1, aoe:false, timer:0 },
    stats: { level:1, xp:0, xpNext:20, kills:0, elapsed:0 },
    magnet:180, wave:1, waveTimer:0, nextBoss:5, bossKills:0,
  };
}

// ── Particles ─────────────────────────────────────────────────────────────────
function spawnParts(x,y,color,n,spd,life) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=spd*(.4+Math.random()*.6);
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life,maxLife:life,color,r:2+Math.random()*2});
  }
}
function ring(x,y,color,n=14,spd=160) {
  for (let i=0;i<n;i++) {
    const a=(i/n)*Math.PI*2;
    G.particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:.45,maxLife:.45,color,r:3.5});
  }
}

// ── Spawn helpers ─────────────────────────────────────────────────────────────
function edgePos(radius=650) {
  const a=Math.random()*Math.PI*2, r=radius+Math.random()*150;
  return {
    x:clamp(G.p.x+Math.cos(a)*r,50,WS-50),
    y:clamp(G.p.y+Math.sin(a)*r,50,WS-50),
  };
}
function spawnEnemy(wave) {
  const pos=edgePos(), tier=Math.min(Math.floor(wave/3),4);
  const cols=['#cc3344','#cc5544','#cc8844','#aacc44','#44ccaa'];
  G.enemies.push({
    x:pos.x,y:pos.y,
    hp:EH+tier*2+rndI(0,2), maxHp:EH+tier*2,
    speed:ES+tier*12+rnd(0,15), r:ER+tier*1.5,
    color:cols[tier], xpValue:3+tier*2, angle:0,
  });
}
function spawnBoss(wave) {
  const def=BOSS_DEFS[G.bossKills%BOSS_DEFS.length];
  const pos=edgePos(800);
  const maxHp=(EH+wave*2)*def.hpMult;
  G.boss={
    x:pos.x,y:pos.y, hp:maxHp,maxHp,
    speed:ES*def.spdMult, r:def.r, color:def.color, glow:def.glow,
    xpValue:def.xp+wave*10, angle:0, pulse:0, def,
    atkTimer:3, chargeVx:0,chargeVy:0,charging:false,chargeTimer:0,
    summonTimer:4, teleportCD:0,
  };
  const banner=document.getElementById('boss-banner');
  document.getElementById('boss-btitle').textContent='⚠ '+def.name+' ⚠';
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'),2800);
  document.getElementById('boss-name').textContent=def.name;
  document.getElementById('boss-bar-wrap').classList.add('active');
  triggerShake(10);
}

// ── XP / leveling ─────────────────────────────────────────────────────────────
function gainXp(amount) {
  G.stats.xp+=amount;
  if (G.stats.xp>=G.stats.xpNext) {
    G.stats.xp-=G.stats.xpNext;
    G.stats.level++;
    G.stats.xpNext=Math.floor(G.stats.xpNext*1.4);
    showUpgrades();
  }
}

// ── Upgrade UI ────────────────────────────────────────────────────────────────
function showUpgrades() {
  running=false;
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  const choices=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,3);
  const container=document.getElementById('upgrade-cards');
  container.innerHTML='';
  choices.forEach(u=>{
    const card=document.createElement('button');
    card.className='upgrade-card';
    card.innerHTML=`<span class="icon">${u.icon}</span><div class="name">${u.name}</div><div class="desc">${u.desc}</div>`;
    card.addEventListener('click',()=>{
      applyUpgrade(u.id);
      document.getElementById('upgrade-overlay').classList.remove('active');
      running=true;
      lastTime=performance.now();
      animId=requestAnimationFrame(loop);
    });
    container.appendChild(card);
  });
  document.getElementById('upgrade-overlay').classList.add('active');
}
function applyUpgrade(id) {
  const g=G.gun, p=G.p;
  if (id==='speed')     p.speed*=1.25;
  if (id==='firerate')  g.firerate/=.7;
  if (id==='damage')    g.damage+=2;
  if (id==='pierce')    g.pierce+=1;
  if (id==='hp')       { p.maxHp+=30; p.hp=Math.min(p.maxHp,p.hp+30); }
  if (id==='multishot') g.multishot=Math.min(7,g.multishot+2);
  if (id==='magnet')    G.magnet+=80;
  if (id==='aoe')       g.aoe=true;
}

// ── Game over ─────────────────────────────────────────────────────────────────
function gameOver() {
  running=false;
  if (animId) { cancelAnimationFrame(animId); animId=null; }
  render(); // clean final frame

  const s=G.stats;
  const entry={kills:s.kills, elapsed:s.elapsed, level:s.level};
  const scores=saveScore(entry);

  const mins=Math.floor(s.elapsed/60);
  const secs=Math.floor(s.elapsed%60).toString().padStart(2,'0');
  const rs=document.getElementById('result-stats');
  rs.style.display='block';
  rs.innerHTML=`<strong>Level ${s.level}</strong> · ${s.kills} kills · ${mins}:${secs} survived`;

  const sp=document.getElementById('scores-panel');
  const sl=document.getElementById('scores-list');
  if (scores.length) {
    sp.style.display='block';
    sl.innerHTML=scores.map((sc,i)=>{
      const m=Math.floor(sc.elapsed/60), ss=Math.floor(sc.elapsed%60).toString().padStart(2,'0');
      const hl=(sc.kills===entry.kills&&sc.level===entry.level)?'hl':'';
      return `<div class="score-row ${hl}"><span class="rank">${i+1}.</span><span class="sc-kills">${sc.kills} kills</span><span class="sc-time">${m}:${ss}</span><span class="sc-lvl">Lv${sc.level}</span></div>`;
    }).join('');
  }

  document.getElementById('overlay-title').textContent='YOU DIED';
  document.getElementById('overlay-sub').textContent='';
  document.getElementById('start-btn').textContent='Try Again';
  document.getElementById('overlay').style.display='flex';
  document.getElementById('boss-bar-wrap').classList.remove('active');
}

// ── Update: player ────────────────────────────────────────────────────────────
function updatePlayer(dt) {
  const p=G.p;
  let dx=0, dy=0;
  if (keys['KeyW']||keys['ArrowUp'])    dy-=1;
  if (keys['KeyS']||keys['ArrowDown'])  dy+=1;
  if (keys['KeyA']||keys['ArrowLeft'])  dx-=1;
  if (keys['KeyD']||keys['ArrowRight']) dx+=1;
  if (joy.active) { dx=joy.dx; dy=joy.dy; }
  const [nx,ny]=norm(dx,dy);
  p.x=clamp(p.x+nx*p.speed*dt, PR, WS-PR);
  p.y=clamp(p.y+ny*p.speed*dt, PR, WS-PR);
  p.iframes=Math.max(0,p.iframes-dt);
  p.trail.unshift({x:p.x,y:p.y});
  if (p.trail.length>18) p.trail.pop();
  G.cam.x+=(p.x-G.cam.x)*8*dt;
  G.cam.y+=(p.y-G.cam.y)*8*dt;
  shake.v=Math.max(0,shake.v-9*dt);
}

// ── Update: gun ───────────────────────────────────────────────────────────────
function updateGun(dt) {
  const g=G.gun;
  g.timer-=dt;
  if (g.timer>0) return;
  g.timer=1/g.firerate;
  let target=G.boss;
  if (!target) {
    let best=Infinity;
    for (const e of G.enemies) { const d=dist(G.p,e); if(d<best){best=d;target=e;} }
  }
  if (!target) return;
  const [bx,by]=norm(target.x-G.p.x, target.y-G.p.y);
  const angles=g.multishot===1?[0]:Array.from({length:g.multishot},(_,i)=>-0.25+(0.5/(g.multishot-1))*i);
  for (const da of angles) {
    const c=Math.cos(da),s=Math.sin(da);
    G.bullets.push({x:G.p.x,y:G.p.y, vx:(bx*c-by*s)*BS, vy:(bx*s+by*c)*BS, damage:g.damage,pierce:g.pierce,hits:0,aoe:g.aoe,life:2});
  }
}

// ── Update: bullets ───────────────────────────────────────────────────────────
function updateBullets(dt) {
  for (let i=G.bullets.length-1;i>=0;i--) {
    const b=G.bullets[i];
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.life-=dt;
    if (b.life<=0||b.x<0||b.x>WS||b.y<0||b.y>WS) { G.bullets.splice(i,1); continue; }

    // Hit boss
    if (G.boss && dist(b,G.boss)<BR+G.boss.r) {
      G.boss.hp-=b.damage; b.hits++;
      spawnParts(b.x,b.y,'#ffe080',4,160,.18);
      triggerShake(2);
      if (b.aoe) spawnParts(b.x,b.y,'#ff8040',10,100,.3);
      if (G.boss.hp<=0) killBoss();
      if (b.hits>b.pierce) { G.bullets.splice(i,1); continue; }
    }

    // Hit enemies — damage pass
    let dead=false;
    for (const e of G.enemies) {
      if (dist(b,e)<BR+e.r) {
        e.hp-=b.damage; b.hits++;
        spawnParts(b.x,b.y,'#ffe080',4,160,.18);
        if (b.aoe) {
          for (const o of G.enemies) if(o!==e&&dist(b,o)<60) o.hp-=Math.floor(b.damage*.5);
          spawnParts(b.x,b.y,'#ff8040',10,100,.3);
        }
        if (b.hits>b.pierce) { dead=true; break; }
      }
    }
    if (dead) { G.bullets.splice(i,1); }
    // Kill pass (separate to avoid index corruption)
    for (let j=G.enemies.length-1;j>=0;j--) {
      if (G.enemies[j].hp<=0) {
        const e=G.enemies[j];
        spawnParts(e.x,e.y,e.color,10,130,.45);
        ring(e.x,e.y,'#ff8040');
        G.pickups.push({x:e.x,y:e.y,xp:e.xpValue,life:12});
        spawnParts(e.x,e.y,'#8080ff',6,90,.5);
        G.enemies.splice(j,1);
        G.stats.kills++;
      }
    }
  }
}

// ── Update: enemies ───────────────────────────────────────────────────────────
function updateEnemies(dt) {
  const p=G.p;
  for (const e of G.enemies) {
    const [dx,dy]=norm(p.x-e.x,p.y-e.y);
    e.x+=dx*e.speed*dt; e.y+=dy*e.speed*dt; e.angle+=dt*2;
    if (p.iframes<=0 && dist(e,p)<e.r+PR) {
      p.hp-=10; p.iframes=.8;
      triggerShake(4);
      spawnParts(p.x,p.y,'#ff4060',5,80,.3);
      if (p.hp<=0) { p.hp=0; gameOver(); return; }
    }
  }
}

// ── Update: boss ──────────────────────────────────────────────────────────────
function updateBoss(dt) {
  const b=G.boss; if(!b) return;
  const p=G.p;
  b.pulse+=dt*3; b.angle+=dt*1.2; b.atkTimer-=dt;
  document.getElementById('boss-fill').style.width=Math.max(0,b.hp/b.maxHp*100)+'%';

  if (b.def.attack==='charge') {
    if (b.charging) {
      b.x=clamp(b.x+b.chargeVx*dt,b.r,WS-b.r);
      b.y=clamp(b.y+b.chargeVy*dt,b.r,WS-b.r);
      b.chargeTimer-=dt;
      if (b.chargeTimer<=0) { b.charging=false; b.atkTimer=2.5; }
    } else {
      const [dx,dy]=norm(p.x-b.x,p.y-b.y);
      b.x+=dx*b.speed*dt; b.y+=dy*b.speed*dt;
      if (b.atkTimer<=0) {
        const [cx,cy]=norm(p.x-b.x,p.y-b.y);
        b.chargeVx=cx*550; b.chargeVy=cy*550;
        b.charging=true; b.chargeTimer=.5;
        triggerShake(6); spawnParts(b.x,b.y,b.color,12,100,.3);
      }
    }
  } else if (b.def.attack==='summon') {
    const [dx,dy]=norm(p.x-b.x,p.y-b.y);
    b.x+=dx*b.speed*dt; b.y+=dy*b.speed*dt;
    b.summonTimer-=dt;
    if (b.atkTimer<=0||b.summonTimer<=0) {
      b.atkTimer=4; b.summonTimer=4;
      for (let i=0;i<3;i++) {
        const a=Math.random()*Math.PI*2;
        G.enemies.push({
          x:clamp(b.x+Math.cos(a)*80,0,WS), y:clamp(b.y+Math.sin(a)*80,0,WS),
          hp:EH+2,maxHp:EH+2, speed:ES+20, r:ER, color:'#cc44ff', xpValue:2, angle:0,
        });
      }
      spawnParts(b.x,b.y,'#cc44ff',16,120,.5); triggerShake(4);
    }
  } else if (b.def.attack==='teleport') {
    const [dx,dy]=norm(p.x-b.x,p.y-b.y);
    b.x+=dx*b.speed*dt; b.y+=dy*b.speed*dt;
    b.teleportCD-=dt;
    if (b.atkTimer<=0&&b.teleportCD<=0) {
      b.atkTimer=2.5; b.teleportCD=2.5;
      const a=Math.random()*Math.PI*2, r=120+Math.random()*80;
      ring(b.x,b.y,b.color,12,120);
      b.x=clamp(p.x+Math.cos(a)*r,b.r,WS-b.r);
      b.y=clamp(p.y+Math.sin(a)*r,b.r,WS-b.r);
      ring(b.x,b.y,b.color,12,120); triggerShake(5);
    }
  }

  b.x=clamp(b.x,b.r,WS-b.r); b.y=clamp(b.y,b.r,WS-b.r);
  if (p.iframes<=0&&dist(b,p)<b.r+PR) {
    p.hp-=b.def.dmg; p.iframes=1;
    triggerShake(8); spawnParts(p.x,p.y,'#ff4060',8,100,.4);
    if (p.hp<=0) { p.hp=0; gameOver(); }
  }
}

function killBoss() {
  const b=G.boss;
  triggerShake(18);
  spawnParts(b.x,b.y,b.color,30,180,.7);
  ring(b.x,b.y,b.color,24,220);
  ring(b.x,b.y,'#ffffff',16,140);
  for (let i=0;i<6;i++) {
    const a=Math.random()*Math.PI*2;
    G.pickups.push({x:b.x+Math.cos(a)*40,y:b.y+Math.sin(a)*40,xp:Math.floor(b.xpValue/6),life:18});
  }
  G.stats.kills++; G.bossKills++;
  G.boss=null;
  G.nextBoss=G.wave+5;
  document.getElementById('boss-bar-wrap').classList.remove('active');
}

// ── Update: pickups ───────────────────────────────────────────────────────────
function updatePickups(dt) {
  const p=G.p;
  for (let i=G.pickups.length-1;i>=0;i--) {
    const pk=G.pickups[i];
    pk.life-=dt;
    const d=dist(pk,p);
    if (d<G.magnet) { const [dx,dy]=norm(p.x-pk.x,p.y-pk.y); pk.x+=dx*300*dt; pk.y+=dy*300*dt; }
    if (d<PR+PKR||pk.life<=0) {
      if (pk.life>0) gainXp(pk.xp);
      G.pickups.splice(i,1);
    }
  }
}

// ── Update: particles ─────────────────────────────────────────────────────────
function updateParticles(dt) {
  for (let i=G.particles.length-1;i>=0;i--) {
    const p=G.particles[i];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.vx*=.92; p.vy*=.92; p.life-=dt;
    if (p.life<=0) G.particles.splice(i,1);
  }
}

// ── Update: wave ──────────────────────────────────────────────────────────────
function updateWave(dt) {
  G.stats.elapsed+=dt;
  G.waveTimer+=dt;
  const interval=Math.max(.3,2-.05*G.wave);
  if (G.waveTimer>=interval) {
    G.waveTimer=0;
    if (!G.boss) for(let i=0;i<Math.floor(1+G.wave*.3);i++) spawnEnemy(G.wave);
    if (G.stats.elapsed>G.wave*15) G.wave++;
    if (!G.boss&&G.wave>=G.nextBoss) spawnBoss(G.wave);
  }
}

// ── HUD update ────────────────────────────────────────────────────────────────
function updateHUD() {
  const s=G.stats, p=G.p;
  document.getElementById('health-fill').style.width=(p.hp/p.maxHp*100)+'%';
  document.getElementById('xp-fill').style.width=(s.xp/s.xpNext*100)+'%';
  document.getElementById('lvl-num').textContent=s.level;
  document.getElementById('kills').textContent=s.kills;
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function w2s(wx,wy,so=[0,0]) {
  return [wx-G.cam.x+canvas.width/2+so[0], wy-G.cam.y+canvas.height/2+so[1]];
}

function drawGrid(so) {
  const W=canvas.width,H=canvas.height;
  const ox=G.cam.x%GC, oy=G.cam.y%GC;
  ctx.strokeStyle='rgba(255,255,255,.04)'; ctx.lineWidth=1; ctx.beginPath();
  for(let x=-ox+so[0];x<W+GC;x+=GC){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=-oy+so[1];y<H+GC;y+=GC){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();
}

function drawPlayer(so) {
  const p=G.p;
  if (p.iframes>0&&Math.floor(p.iframes*15)%2===0) return;
  const [sx,sy]=w2s(p.x,p.y,so);
  // Trail
  for(let i=0;i<p.trail.length;i++){
    const [tx,ty]=w2s(p.trail[i].x,p.trail[i].y,so);
    ctx.beginPath();ctx.arc(tx,ty,PR*(1-i/p.trail.length),0,Math.PI*2);
    ctx.fillStyle=`rgba(140,200,255,${(1-i/p.trail.length)*.28})`;ctx.fill();
  }
  const grd=ctx.createRadialGradient(sx,sy,0,sx,sy,PR*2.5);
  grd.addColorStop(0,'rgba(120,200,255,.28)');grd.addColorStop(1,'rgba(120,200,255,0)');
  ctx.beginPath();ctx.arc(sx,sy,PR*2.5,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();ctx.arc(sx,sy,PR,0,Math.PI*2);ctx.fillStyle='#c8e8ff';ctx.fill();
  ctx.beginPath();ctx.arc(sx,sy,PR*.4,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
}

function drawBullets(so) {
  for(const b of G.bullets){
    const [sx,sy]=w2s(b.x,b.y,so);
    ctx.beginPath();ctx.arc(sx,sy,BR,0,Math.PI*2);ctx.fillStyle=b.aoe?'#ff8040':'#ffe060';ctx.fill();
    ctx.beginPath();ctx.arc(sx,sy,BR*2,0,Math.PI*2);ctx.fillStyle=b.aoe?'rgba(255,128,64,.2)':'rgba(255,220,80,.2)';ctx.fill();
  }
}

function drawEnemies(so) {
  for(const e of G.enemies){
    const [sx,sy]=w2s(e.x,e.y,so);
    ctx.save();ctx.translate(sx,sy);ctx.rotate(e.angle);
    ctx.beginPath();
    for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.lineTo(Math.cos(a)*e.r,Math.sin(a)*e.r);}
    ctx.closePath();ctx.fillStyle=e.color;ctx.fill();ctx.restore();
    if(e.hp<e.maxHp){
      const bw=e.r*2,f=(e.hp/e.maxHp)*bw;
      ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(sx-e.r,sy-e.r-7,bw,3);
      ctx.fillStyle='#e05060';ctx.fillRect(sx-e.r,sy-e.r-7,f,3);
    }
  }
}

function drawBoss(so) {
  const b=G.boss; if(!b) return;
  const [sx,sy]=w2s(b.x,b.y,so);
  const pr=b.r*(1+Math.sin(b.pulse)*.06);
  const grd=ctx.createRadialGradient(sx,sy,pr*.5,sx,sy,pr*2.2);
  grd.addColorStop(0,b.glow);grd.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(sx,sy,pr*2.2,0,Math.PI*2);ctx.fillStyle=grd;ctx.fill();
  ctx.save();ctx.translate(sx,sy);ctx.rotate(b.angle);
  ctx.beginPath();
  for(let i=0;i<8;i++){const a=(i/8)*Math.PI*2;ctx.lineTo(Math.cos(a)*pr,Math.sin(a)*pr);}
  ctx.closePath();ctx.fillStyle=b.color;ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=2;ctx.stroke();ctx.restore();
  ctx.beginPath();ctx.arc(sx,sy,pr*.35,0,Math.PI*2);ctx.fillStyle='rgba(255,255,255,.9)';ctx.fill();
  ctx.fillStyle=b.color;ctx.font='bold 10px Courier New';ctx.textAlign='center';
  ctx.fillText(b.def.name,sx,sy-pr-10);ctx.textAlign='left';
  if(b.charging){ctx.beginPath();ctx.arc(sx,sy,pr*1.6,0,Math.PI*2);ctx.strokeStyle='rgba(255,100,50,.5)';ctx.lineWidth=3;ctx.stroke();}
}

function drawPickups(so) {
  const t=performance.now()/1000;
  for(const pk of G.pickups){
    const [sx,sy]=w2s(pk.x,pk.y,so);
    const pulse=.7+Math.sin(t*4+pk.xp)*.3;
    const a=Math.min(1,pk.life/4);
    ctx.beginPath();ctx.arc(sx,sy,PKR*pulse,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,100,255,${.55*a})`;ctx.fill();
    ctx.strokeStyle=`rgba(180,180,255,${.8*a})`;ctx.lineWidth=1.5;ctx.stroke();
  }
}

function drawParticles(so) {
  for(const p of G.particles){
    const [sx,sy]=w2s(p.x,p.y,so);
    const a=p.life/p.maxLife;
    ctx.beginPath();ctx.arc(sx,sy,p.r*a,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=a;ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawVignette() {
  const W=canvas.width,H=canvas.height;
  const g=ctx.createRadialGradient(W/2,H/2,H*.2,W/2,H/2,H*.85);
  g.addColorStop(0,'rgba(0,0,0,0)');g.addColorStop(1,'rgba(0,0,0,.55)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawHUDCanvas() {
  const s=G.stats;
  const mins=Math.floor(s.elapsed/60), secs=Math.floor(s.elapsed%60).toString().padStart(2,'0');
  ctx.font='10px Courier New';
  ctx.fillStyle='rgba(180,180,180,.28)';ctx.fillText(`${mins}:${secs}`,16,canvas.height-16);
  ctx.fillStyle='rgba(200,192,255,.32)';ctx.fillText(`WAVE ${G.wave}`,canvas.width-70,canvas.height-16);
  if(G.bossKills>0){ctx.fillStyle='rgba(255,160,80,.35)';ctx.fillText(`Bosses: ${G.bossKills}`,16,canvas.height-32);}
}

function drawMinimap() {
  const S=mm.width, scale=(S-MM_M*2)/WS;
  mctx.clearRect(0,0,S,S);
  mctx.fillStyle='rgba(8,8,16,.88)';mctx.fillRect(0,0,S,S);
  mctx.strokeStyle='rgba(255,80,80,.18)';mctx.lineWidth=1;
  mctx.strokeRect(MM_M,MM_M,S-MM_M*2,S-MM_M*2);
  const mx=wx=>MM_M+wx*scale, my=wy=>MM_M+wy*scale;
  // Pickups
  mctx.fillStyle='rgba(100,100,255,.45)';
  for(const pk of G.pickups){mctx.beginPath();mctx.arc(mx(pk.x),my(pk.y),1.2,0,Math.PI*2);mctx.fill();}
  // Enemies
  mctx.fillStyle='#cc3344';
  for(const e of G.enemies){mctx.beginPath();mctx.arc(mx(e.x),my(e.y),1.8,0,Math.PI*2);mctx.fill();}
  // Boss
  if(G.boss){
    const pulse=.7+Math.sin(G.boss.pulse)*.3;
    mctx.fillStyle=G.boss.color;mctx.beginPath();mctx.arc(mx(G.boss.x),my(G.boss.y),4*pulse,0,Math.PI*2);mctx.fill();
  }
  // Viewport rect
  const vw=canvas.width/2*scale,vh=canvas.height/2*scale;
  mctx.strokeStyle='rgba(255,255,255,.05)';mctx.lineWidth=.5;
  mctx.strokeRect(mx(G.cam.x)-vw,my(G.cam.y)-vh,vw*2,vh*2);
  // Player
  const px=mx(G.p.x),py=my(G.p.y);
  mctx.beginPath();mctx.arc(px,py,5,0,Math.PI*2);mctx.fillStyle='rgba(140,200,255,.2)';mctx.fill();
  mctx.beginPath();mctx.arc(px,py,2.5,0,Math.PI*2);mctx.fillStyle='#c8e8ff';mctx.fill();
}

function render() {
  if (!G) { ctx.fillStyle='#0c0c12';ctx.fillRect(0,0,canvas.width,canvas.height); return; }
  const so=shakeOff();
  ctx.fillStyle='#0c0c12';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Border danger
  const ed=Math.min(G.p.x,G.p.y,WS-G.p.x,WS-G.p.y);
  if(ed<200){const a=(1-ed/200)*.15,g2=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width/3,canvas.width/2,canvas.height/2,canvas.width);g2.addColorStop(0,'rgba(255,40,40,0)');g2.addColorStop(1,`rgba(255,40,40,${a})`);ctx.fillStyle=g2;ctx.fillRect(0,0,canvas.width,canvas.height);}
  drawGrid(so);
  // World border line
  const [bx,by]=w2s(0,0,so);ctx.strokeStyle='rgba(255,80,80,.22)';ctx.lineWidth=2;ctx.strokeRect(bx,by,WS,WS);
  drawParticles(so);
  drawPlayer(so);
  drawBullets(so);
  drawEnemies(so);
  drawBoss(so);
  drawPickups(so);
  drawVignette();
  drawHUDCanvas();
  drawMinimap();
}

// ── Main loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!running) return;
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  updatePlayer(dt);   if(!running)return;
  updateGun(dt);
  updateBullets(dt);  if(!running)return;
  updateEnemies(dt);  if(!running)return;
  updateBoss(dt);     if(!running)return;
  updatePickups(dt);  if(!running)return;
  updateParticles(dt);
  updateWave(dt);
  updateHUD();
  render();
  animId=requestAnimationFrame(loop);
}

// ── Init ──────────────────────────────────────────────────────────────────────
render(); // blank title frame
</script>
</body>
</html>
